[build]
  publish = "."
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# ── REDIRECTS ──
# Friendly resume URL
[[redirects]]
  from = "/resume"
  to = "/documents/zain-resume.pdf"
  status = 200

# SPA fallback — anchor navigation is the only routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── CACHING ──
# Long-lived immutable assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Resume may be updated occasionally
[[headers]]
  for = "/documents/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Favicons — medium cache
[[headers]]
  for = "/favicon/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# CSS and JS — revalidate every hour, serve stale while fetching new
[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# HTML — always revalidate so client edits appear immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# data.json — always revalidate so client edits appear immediately
[[headers]]
  for = "/data.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/json; charset=utf-8"

# ── SECURITY (applies site-wide) ──
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    X-DNS-Prefetch-Control = "on"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self'; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'"

# ── NETLIFY FORMS ──
[[forms]]
  name = "contact"

# ── LOCAL DEV ──
[dev]
  command = "npm run dev"
  port = 3000
  publish = "."
  autoLaunch = false
